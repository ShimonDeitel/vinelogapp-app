name: Vinelog
options:
  bundleIdPrefix: com.shimondeitel.vinelogapp
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Vinelog:
    type: application
    platform: iOS
    sources:
      - path: Vinelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vinelogapp
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Vinelog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  VinelogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VinelogTests
      - path: Vinelog.storekit
    dependencies:
      - target: Vinelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vinelogapp.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  VinelogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: VinelogUITests
    dependencies:
      - target: Vinelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vinelogapp.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Vinelog:
    build:
      targets:
        Vinelog: all
        VinelogTests: [test]
        VinelogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Vinelog.storekit
    test:
      config: Debug
      storeKitConfiguration: Vinelog.storekit
      targets:
        - VinelogTests
        - VinelogUITests
    archive:
      config: Release
